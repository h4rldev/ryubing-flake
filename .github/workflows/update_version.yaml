name: Update Ryubing version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: nixos/nix-install-action@v3
        with:
          # extra-conf: "experimental-features = nix-command flakes"
          # We need nix-prefetch-url available
          nix-install: "nix"

      - name: Make script executable
        run: chmod +x ./get_latest_rybing.sh

      - name: Run update script
        run: |
          ./get_latest_rybing.sh

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add ryubin_version.json
            git commit -m "chore: update Ryubing version"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
